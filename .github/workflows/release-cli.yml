name: Release CLI

on:
  push:
    tags:
      - "mem0-cli/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: mem0-cli/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: goreleaser/goreleaser-action@v6
        with:
          workdir: mem0-cli
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#mem0-cli/v}" >> "$GITHUB_OUTPUT"

      - name: Update npm package version
        run: cd mem0-cli/npm && npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish npm package
        run: cd mem0-cli/npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
